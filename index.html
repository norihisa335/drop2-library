<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Guitar Voicing Library</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button id="backButton" class="icon-button hidden" type="button" aria-label="Back">
        <span aria-hidden="true">‹</span>
      </button>

      <div class="header-title-wrap">
        <p class="eyebrow">Guitar Voicing Library</p>
        <h1 id="pageTitle">Home</h1>
      </div>

      <label id="degreeControl" class="degree-control hidden">
        <span>Degrees</span>
        <input id="degreeToggle" type="checkbox" checked />
        <span class="switch" aria-hidden="true"></span>
      </label>
    </header>

    <main id="app" class="app-main" aria-live="polite"></main>
  </div>

  <script src="./data.js"></script>
  <script src="./fretboard.js"></script>
  <script src="./app.js"></script>
</body>
</html>
