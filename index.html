<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Drop Voicing">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Drop Voicing Library</title>
  <style>
    :root{--bg:#f5f5f2;--card:#fff;--ink:#171717;--muted:#6b6b6b;--line:#d8d8d2;--accent:#111}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif}
    header{padding:calc(18px + env(safe-area-inset-top)) 18px 14px;background:#111;color:#fff}
    header h1{font-size:22px;margin:0 0 4px} header p{margin:0;color:#bbb;font-size:13px}
    main{max-width:760px;margin:auto;padding:14px 14px calc(30px + env(safe-area-inset-bottom))}
    .panel,.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
    select,button{width:100%;font:inherit;border:1px solid #c8c8c3;border-radius:11px;background:#fff;padding:11px}
    button.segment.active{background:#111;color:#fff;border-color:#111}
    .segments{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .switchline{display:flex;align-items:center;justify-content:space-between;padding-top:10px}
    .switchline input{width:22px;height:22px}
    .titleline{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .chord{font-size:28px;font-weight:800;letter-spacing:-.4px}
    .meta{font-size:13px;color:var(--muted);margin-top:3px}
    .badge{font-size:12px;padding:5px 8px;border-radius:999px;background:#efefec;white-space:nowrap}
    .diagram-wrap{overflow-x:auto;margin-top:10px}
    svg{display:block;width:100%;min-width:320px;height:auto}
    .location-tabs{display:flex;gap:7px;overflow-x:auto;padding:4px 0 2px}
    .location-tabs button{width:auto;min-width:82px;padding:8px 12px}
    .note{font-size:13px;line-height:1.55;background:#f6f6f3;border-radius:10px;padding:10px;margin-top:10px}
    .empty{text-align:center;color:var(--muted);padding:30px 12px}
    @media(max-width:420px){.grid{grid-template-columns:1fr 1fr}.panel{padding:12px}.chord{font-size:25px}}
  </style>
</head>
<body>
<header><h1>Drop Voicing Library</h1><p>Drop2 prototype v0.1</p></header>
<main>
  <section class="panel">
    <div class="segments">
      <button id="stdBtn" class="segment active">Standard</button>
      <button id="pracBtn" class="segment">Practical</button>
    </div>
    <div class="grid" style="margin-top:12px">
      <div><label>Root</label><select id="root"></select></div>
      <div><label>Quality</label><select id="quality"></select></div>
      <div><label>String Set</label><select id="stringSet"></select></div>
      <div><label>Inversion</label><select id="inversion"></select></div>
    </div>
    <div class="switchline"><span>度数を表示</span><input id="degrees" type="checkbox" checked></div>
  </section>
  <section id="result"></section>
</main>
<script src="data.js"></script>
<script>
const roots=[["C",0],["C♯/D♭",1],["D",2],["E♭",3],["E",4],["F",5],["F♯/G♭",6],["G",7],["A♭",8],["A",9],["B♭",10],["B",11]];
const els={root:document.querySelector("#root"),quality:document.querySelector("#quality"),stringSet:document.querySelector("#stringSet"),inversion:document.querySelector("#inversion"),degrees:document.querySelector("#degrees"),result:document.querySelector("#result"),stdBtn:document.querySelector("#stdBtn"),pracBtn:document.querySelector("#pracBtn")};
let library="standard", locationIndex=0;
const orderInv=["Root","1st","2nd","3rd"];
roots.forEach(([n,v])=>els.root.add(new Option(n,v)));
function unique(key){return [...new Set(window.DROP2_DATA[library].map(x=>x[key]))]}
function fillSelect(el, vals, keep){
  el.innerHTML="";
  vals.forEach(v=>el.add(new Option(v,v)));
  if(vals.includes(keep)) el.value=keep;
}
function refreshFilters(){
  fillSelect(els.quality,unique("Quality"),els.quality.value);
  fillSelect(els.stringSet,unique("String Set"),els.stringSet.value);
  fillSelect(els.inversion,unique("Inversion").sort((a,b)=>orderInv.indexOf(a)-orderInv.indexOf(b)),els.inversion.value);
  locationIndex=0; render();
}
function selectedRecord(){
  return window.DROP2_DATA[library].find(x=>x.Quality===els.quality.value&&x["String Set"]===els.stringSet.value&&x.Inversion===els.inversion.value);
}
function positions(rec){
  const shift=Number(els.root.value);
  const frets=["S6","S5","S4","S3","S2","S1"].map(k=>rec[k]);
  const out=[];
  for(let oct=-24;oct<=24;oct+=12){
    const p=frets.map(f=>f==null?null:Number(f)+shift+oct);
    const used=p.filter(v=>v!=null);
    if(used.length && Math.min(...used)>=0 && Math.max(...used)<=24){
      const key=p.join(",");
      if(!out.some(x=>x.key===key)) out.push({key,frets:p,min:Math.min(...used),max:Math.max(...used)});
    }
  }
  out.sort((a,b)=>a.min-b.min);
  const labels=out.length===1?["Middle"]:out.length===2?["Low","High"]:out.map((_,i)=>i===0?"Low":i===out.length-1?"High":"Middle");
  out.forEach((x,i)=>x.label=labels[i]);
  return out;
}
function chordName(rec){
  const root=roots.find(x=>x[1]===Number(els.root.value))[0].split("/")[0];
  const q={Maj7:"Maj7","7":"7","m7":"m7","m7♭5":"m7♭5"}[rec.Quality]||rec.Quality;
  return root+q;
}
function svgDiagram(rec,pos){
  const W=360,H=330,left=48,right=24,top=42,bottom=34;
  const strings=6, gapX=(W-left-right)/(strings-1);
  let start=Math.max(0,pos.min===0?0:pos.min-1);
  let end=Math.min(24,Math.max(start+4,pos.max+1));
  if(end-start<4) end=start+4;
  const fretCount=end-start, gapY=(H-top-bottom)/fretCount;
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="guitar chord diagram">`;
  s+=`<rect x="0" y="0" width="${W}" height="${H}" rx="16" fill="#fff"/>`;
  for(let i=0;i<strings;i++){let x=left+i*gapX;s+=`<line x1="${x}" y1="${top}" x2="${x}" y2="${H-bottom}" stroke="#777" stroke-width="${1+i*.14}"/>`}
  for(let f=0;f<=fretCount;f++){let y=top+f*gapY;s+=`<line x1="${left}" y1="${y}" x2="${W-right}" y2="${y}" stroke="#222" stroke-width="${f===0&&start===0?5:1.25}"/>`}
  s+=`<text x="14" y="${top+gapY*.72}" font-size="14" fill="#555">${start===0?"":(start+1)+"fr"}</text>`;
  const degrees=["D6","D5","D4","D3","D2","D1"].map(k=>rec[k]);
  pos.frets.forEach((f,i)=>{
    const x=left+i*gapX;
    if(f==null){s+=`<text x="${x}" y="28" text-anchor="middle" font-size="18" fill="#999">×</text>`;return}
    if(f===0){s+=`<circle cx="${x}" cy="22" r="9" fill="none" stroke="#222" stroke-width="2"/>`;return}
    const row=f-start-.5, y=top+row*gapY;
    s+=`<circle cx="${x}" cy="${y}" r="15" fill="#111"/>`;
    if(els.degrees.checked && degrees[i]!=null){
      const d=String(degrees[i]).replaceAll("b","♭").replaceAll("#","♯");
      s+=`<text x="${x}" y="${y+4.5}" text-anchor="middle" font-size="${d.length>2?10:12}" font-weight="700" fill="#fff">${d}</text>`;
    }
  });
  ["6","5","4","3","2","1"].forEach((n,i)=>s+=`<text x="${left+i*gapX}" y="${H-10}" text-anchor="middle" font-size="12" fill="#777">${n}</text>`);
  return s+"</svg>";
}
function render(){
  const rec=selectedRecord();
  if(!rec){els.result.innerHTML='<div class="card empty">該当フォームがありません</div>';return}
  const ps=positions(rec);
  if(locationIndex>=ps.length) locationIndex=0;
  const pos=ps[locationIndex];
  const tabs=ps.map((p,i)=>`<button class="${i===locationIndex?"segment active":"segment"}" data-i="${i}">${p.label}<br><small>${p.min}–${p.max}fr</small></button>`).join("");
  const use=rec["Use Case"]||rec.Notes||"";
  els.result.innerHTML=`<article class="card">
    <div class="titleline"><div><div class="chord">${chordName(rec)}</div><div class="meta">${rec["String Set"]} strings · ${rec.Inversion} inversion · ${library==="standard"?"Standard":"Practical"}</div></div><span class="badge">${rec.ID}</span></div>
    <div class="location-tabs">${tabs}</div>
    <div class="diagram-wrap">${svgDiagram(rec,pos)}</div>
    ${use?`<div class="note"><strong>${library==="practical"?"Use Case":"Note"}</strong><br>${use}</div>`:""}
  </article>`;
  els.result.querySelectorAll("[data-i]").forEach(b=>b.onclick=()=>{locationIndex=Number(b.dataset.i);render()});
}
[els.root,els.quality,els.stringSet,els.inversion,els.degrees].forEach(e=>e.addEventListener("change",()=>{locationIndex=0;render()}));
els.stdBtn.onclick=()=>{library="standard";els.stdBtn.classList.add("active");els.pracBtn.classList.remove("active");refreshFilters()};
els.pracBtn.onclick=()=>{library="practical";els.pracBtn.classList.add("active");els.stdBtn.classList.remove("active");refreshFilters()};
refreshFilters();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body></html>
